<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TabTrail 侧边栏</title>
    <link rel="stylesheet" href="./sidepanel.css">
  </head>
  <body>
    <main class="panel-shell panel-workbench">
      <header class="panel-header">
        <div>
          <p class="eyebrow">标签工作台</p>
          <h1>TabTrail</h1>
        </div>
        <section id="panel-status" class="status-grid" aria-label="整理状态">
          <div class="status-item">
            <span class="status-value" id="summary-open-tabs">0</span>
            <span class="status-label">当前范围</span>
          </div>
          <div class="status-item">
            <span class="status-value" id="summary-visible-tabs">0</span>
            <span class="status-label">可见标签</span>
          </div>
          <div class="status-item">
            <span class="status-value" id="summary-recent-closed">0</span>
            <span class="status-label">最近关闭</span>
          </div>
        </section>
      </header>
      <section id="panel-tools" class="tool-panel" aria-label="整理工具">
        <div class="scope-switch" aria-label="标签范围">
          <button type="button" class="scope-button is-active" data-scope="current-window" aria-pressed="true">当前窗口</button>
          <button type="button" class="scope-button" data-scope="all-windows" aria-pressed="false">全部窗口</button>
        </div>
        <label class="search-field">
          <span>搜索</span>
          <input id="tab-search" type="search" placeholder="标题、URL、域名">
        </label>
        <div class="category-bar" aria-label="手动分类">
          <input id="category-name" type="text" placeholder="分类名，例如 工作">
          <button id="assign-category" type="button">归类已选</button>
        </div>
      </section>
      <section class="recent-grid" aria-label="最近记录">
        <section id="recent-active-panel" class="recent-panel" aria-labelledby="recent-active-title">
          <h2 id="recent-active-title">最近活跃</h2>
          <ul id="recent-active-list" class="compact-list"></ul>
        </section>
        <section id="recent-closed-panel" class="recent-panel" aria-labelledby="recent-closed-title">
          <h2 id="recent-closed-title">最近关闭</h2>
          <ul id="recent-closed-list" class="compact-list"></ul>
        </section>
      </section>
      <section id="focus-mode-panel" class="focus-panel" aria-labelledby="focus-mode-title">
        <h2 id="focus-mode-title">专注整理</h2>
        <p>TabTrail 不能直接隐藏浏览器原生顶部标签栏。可以先用侧边栏、新标签页和批量整理减少拥挤。</p>
        <p>关闭 3 个及以上标签前会再次确认，关闭后可在最近关闭中重新打开。</p>
      </section>
      <p id="panel-message" class="status-message" role="status" aria-live="polite" aria-atomic="true">当前窗口：0 个标签，0 个匹配</p>
      <section id="panel-actions" class="panel-actions" aria-label="批量操作"></section>
      <section id="tab-groups" class="tab-groups"></section>
    </main>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
